<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Replicating a Table Exercise</title>
</head>
<body>
  <!-- Replicating a Table Exercise -->
  <h1>Replicating a Table Exercise</h1>
  
  <table>
    <table border = "1">
    <style>
      table {
        width: 70%;
        border-collapse: collapse;
      }
      th, td {
        border: 1px solid #0d0c0c;
        padding :12px;
        text-align: left;
      }
    </style>
  
    <tr>
      <th>Rank</th>
      <th>Province</th>
      <th>Population(2011)</th>
      <th>Area(km²)</th>
      <th>Density(per km²)</th>
    </tr>
    <tr>
      <td>1</td>
      <td>Gauteng</td>
      <td>12,272,263</td>
      <td>18,178</td>
      <td>675.1</td>
    </tr>
  
    <tr>
      <td>2</td>
      <td>KwaZulu-Natal</td>
      <td>10,267,300</td>
      <td>120,361</td>
      <td>85.3</td>
    </tr>
  
    <tr>
      <td>3</td>
      <td>Mpumalanga</td>
      <td>4,039,939</td>
      <td>79,495</td>
      <td>52.8</td>
    </tr>
    <tr>
      <td>4</td>
      <td>Western Cape</td>
      <td>5,822,734</td>
      <td>129,462</td>
      <td>45.0</td>
    </tr>
    <tr>
      <td>5</td>
      <td>Limpopo</td>
      <td>5,404,868</td>
      <td>125,754</td>
      <td>43.0</td>
    </tr>
  </tbody>
</table>
</body>
</html>
