<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Page</title>
  <link rel="stylesheet" href="contactstyle.css">
</head>
<body>
  <header>
    <h1>CONTACT US</h1>
    <p>Fill in the form below to get in touch.</p>
  </header>
  <form >
    <label for="fname">Full Name:</label>
    <input type="text" id="fname" name="fname" placeholder="eg.Khanya Mfunda"><br>
    <p></p>
    <label for="email address"> Email Adress:</label>
    <input type="text" id="email address" name="email address" placeholder="Enter your email..">
    <p></p>
    <label for="phone number">Cell Number:</label>
    <input type="tel" id="phone number" name="phone number" placeholder="enter 10 digt no..."><br>
    <p></p>
    <label for="subjects">Choose A Subject</label>
    <select name="subject" id="subjects">
      <option value="option 1">OPTION 1></option>
      <option value="option 2">OPTION 2</option>
      <option value="option 3">OPTION 3</option>
    </select><br>
    <p></p>
    <label for="message">Text Area:</label><br>
    <textarea id="message" name="message" placeholder="please leave us a message..."></textarea><br>
    <p></p>
    <input type="submit" value="submit">
  </form><br>
  <p></p>
  <table>
    <tbody>
    <tr>
      <th>Day</th>
      <th>Morning</th>
      <th>Afternoon</th>
    </tr>
    <tr>
      <td>Monday</td>
      <td>10am-11am</td>
      <td>2:30pm-3:30pm</td>
    </tr>
    <tr>
      <td>Tuesday</td>
      <td>9am-10am</td>
      <td>1pm-2pm</td>
    </tr>
    <tr>
      <td>Wednesday</td>
      <td>8am-9am</td>
      <td>1pm-2pm</td>
    </tr>
    <tr>
      <td>Thursday</td>
      <td>11am-12pm</td>
      <td>3pm-4pm</td>
    </tr>
    <tr>
      <td>Friday</td>
      <td>9am-10am</td>
      <td>1pm-2pm</td>
    </tr>
  </tbody>
  </table>
</body>
</html>
